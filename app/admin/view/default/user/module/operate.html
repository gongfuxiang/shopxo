<!-- 操作栏 -->
{{if AdminIsPower('user', 'detail')}}
    <button type="button" class="am-btn am-btn-default am-btn-xs am-radius am-btn-block submit-popup" data-url="{{:MyUrl('admin/user/detail', ['id'=>$module_data['id']])}}" data-title="{{:MyLang('detail_title')}}" data-offcanvas="right">
        <i class="am-icon-eye"></i>
        <span>{{:MyLang('detail_title')}}</span>
    </button>
{{/if}}
{{if AdminIsPower('user', 'saveinfo')}}
    <a class="am-btn am-btn-secondary am-btn-xs am-radius am-btn-block" href="{{:MyUrl('admin/user/saveinfo', array_merge($form_back_params, ['id'=>$module_data['id']]))}}">
        <i class="am-icon-edit"></i>
        <span>{{:MyLang('edit_title')}}</span>
    </a>
{{/if}}
{{if AdminIsPower('user', 'delete')}}
    <button type="button" class="am-btn am-btn-danger am-btn-xs am-radius am-btn-block submit-delete" data-url="{{:MyUrl('admin/user/delete')}}" data-id="{{$module_data.id}}" data-key="ids">
        <i class="iconfont icon-delete"></i>
        <span>{{:MyLang('delete_title')}}</span>
    </button>
{{/if}}
