<!-- 操作栏 -->
{{if AdminIsPower('forminputdata', 'detail')}}
    <button type="button" class="am-btn am-btn-default am-btn-xs am-radius am-btn-block submit-popup" data-url="{{:MyUrl('admin/forminputdata/detail', ['id'=>$module_data['id']])}}" data-title="{{:MyLang('detail_title')}}" data-offcanvas="right">
        <i class="am-icon-eye"></i>
        <span>{{:MyLang('detail_title')}}</span>
    </button>
{{/if}}
{{if AdminIsPower('forminputdata', 'delete')}}
    <button type="button" class="am-btn am-btn-danger am-btn-xs am-radius am-btn-block submit-delete" data-url="{{:MyUrl('admin/forminputdata/delete')}}" data-id="{{$module_data.id}}" data-key="ids">
        <i class="iconfont icon-delete"></i>
        <span>{{:MyLang('delete_title')}}</span>
    </button>
{{/if}}
