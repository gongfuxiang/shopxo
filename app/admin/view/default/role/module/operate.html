<!-- 操作栏 -->
{{if AdminIsPower('role', 'detail')}}
    <button type="button" class="am-btn am-btn-default am-btn-xs am-radius am-btn-block submit-popup" data-url="{{:MyUrl('admin/role/detail', ['id'=>$module_data['id']])}}" data-title="{{:MyLang('detail_title')}}" data-offcanvas="right">
        <i class="am-icon-eye"></i>
        <span>{{:MyLang('detail_title')}}</span>
    </button>
{{/if}}
{{if $module_data['id'] neq 1}}
    {{if AdminIsPower('role', 'saveinfo')}}
        <a class="am-btn am-btn-secondary am-btn-xs am-radius am-btn-block" href="{{:MyUrl('admin/role/saveinfo', array_merge($form_back_params, ['id'=>$module_data['id']]))}}">
            <i class="am-icon-edit"></i>
            <span>{{:MyLang('edit_title')}}</span>
        </a>
    {{/if}}
    {{if AdminIsPower('role', 'delete')}}
        <button type="button" class="am-btn am-btn-danger am-btn-xs am-radius am-btn-block submit-delete" data-url="{{:MyUrl('admin/role/delete')}}" data-id="{{$module_data.id}}" data-key="ids">
            <i class="iconfont icon-delete"></i>
            <span>{{:MyLang('delete_title')}}</span>
        </button>
    {{/if}}
{{/if}}
